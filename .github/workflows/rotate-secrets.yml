name: Rotate Runner Bootstrap Secrets

on:
  workflow_dispatch:
    inputs:
      secretName:
        description: 'Secret to rotate (admin-password, ado-pat, or all)'
        required: true
        default: 'admin-password'
        type: choice
        options:
          - admin-password
          - all
      forceRotate:
        description: 'Force rotation even if secret is not expired'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 6 1 * *'  # Monthly on the 1st at 06:00 UTC

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    name: Rotate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        shell: bash
        run: |
          if [ ! -f env/dev.json ]; then
            mkdir -p env
            cat > env/dev.json <<ENVEOF
          {
            "ORG": "${{ vars.ORG }}",
            "ENV": "${{ vars.ENV }}",
            "LOCATION": "${{ vars.LOCATION }}",
            "LOC": "${{ vars.LOC }}",
            "UNIQUE_SUFFIX": "${{ vars.UNIQUE_SUFFIX }}",
            "RESOURCE_GROUP": "${{ vars.RESOURCE_GROUP }}",
            "GALLERY_NAME": "${{ vars.GALLERY_NAME }}",
            "PACKER_TEMP_RG": "${{ vars.PACKER_TEMP_RG }}",
            "PACKER_VM_SIZE": "${{ vars.PACKER_VM_SIZE }}",
            "ADMIN_USERNAME": "${{ vars.ADMIN_USERNAME }}"
          }
          ENVEOF
          fi
          jq -r 'to_entries[] | "\(.key)=\(.value)"' env/dev.json >> "$GITHUB_ENV"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Key Vault
        id: kv
        shell: bash
        run: |
          KV_NAME=$(az keyvault list -g "$RESOURCE_GROUP" --query '[0].name' -o tsv)
          if [ -z "$KV_NAME" ]; then
            echo "No Key Vault found in $RESOURCE_GROUP" >&2
            exit 1
          fi
          echo "name=$KV_NAME" >> "$GITHUB_OUTPUT"

      - name: Rotate admin-password
        if: inputs.secretName == 'admin-password' || inputs.secretName == 'all' || github.event_name == 'schedule'
        shell: bash
        run: |
          KV_NAME="${{ steps.kv.outputs.name }}"
          FORCE="${{ inputs.forceRotate || 'false' }}"
          
          # Check current secret age
          UPDATED=$(az keyvault secret show --vault-name "$KV_NAME" --name admin-password --query 'attributes.updated' -o tsv 2>/dev/null || echo '')
          if [ -n "$UPDATED" ] && [ "$FORCE" != "true" ]; then
            AGE_DAYS=$(( ($(date +%s) - $(date -d "$UPDATED" +%s)) / 86400 ))
            echo "Current admin-password age: $AGE_DAYS days"
            if [ "$AGE_DAYS" -lt 30 ]; then
              echo "Secret is less than 30 days old. Skipping rotation (use forceRotate to override)."
              exit 0
            fi
          fi
          
          # Generate new strong password
          NEW_PW="$(openssl rand -base64 36 | tr -d '=+/\n' | cut -c1-24)Aa1!"
          echo "::add-mask::$NEW_PW"
          
          # Store in Key Vault
          az keyvault secret set --vault-name "$KV_NAME" --name admin-password --value "$NEW_PW" --output none
          echo "admin-password rotated successfully"
          
          # Record rotation event as a tag
          az keyvault secret set-attributes --vault-name "$KV_NAME" --name admin-password \
            --tags rotated-by="github-actions" rotated-at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" rotation-run="${{ github.run_id }}" \
            --output none

      - name: Rotation Summary
        shell: bash
        run: |
          KV_NAME="${{ steps.kv.outputs.name }}"
          echo "### Secret Rotation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret | Last Updated | Tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------------|------|" >> "$GITHUB_STEP_SUMMARY"
          for secret in admin-password ado-pat gh-runner-token; do
            UPDATED=$(az keyvault secret show --vault-name "$KV_NAME" --name "$secret" --query 'attributes.updated' -o tsv 2>/dev/null || echo 'N/A')
            TAGS=$(az keyvault secret show --vault-name "$KV_NAME" --name "$secret" --query 'tags' -o json 2>/dev/null || echo '{}')
            echo "| $secret | $UPDATED | $TAGS |" >> "$GITHUB_STEP_SUMMARY"
          done
