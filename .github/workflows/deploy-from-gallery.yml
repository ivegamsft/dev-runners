name: Deploy Base Infra (Gallery Images)

on:
  workflow_dispatch:
    inputs:
      enableGhPublicIp:
        description: 'Expose public IP for GitHub runner VM (not recommended for prod)'
        required: false
        default: 'false'
      linuxVmSize:
        description: 'Linux VMSS size'
        required: false
        default: 'Standard_D4s_v5'
      windowsVmSize:
        description: 'Windows VM size (GitHub runner placeholder)'
        required: false
        default: 'Standard_D4s_v5'

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        shell: bash
        run: |
          if [ ! -f env/dev.json ]; then
            mkdir -p env
            cat > env/dev.json <<ENVEOF
          {
            "ORG": "${{ vars.ORG }}",
            "ENV": "${{ vars.ENV }}",
            "LOCATION": "${{ vars.LOCATION }}",
            "LOC": "${{ vars.LOC }}",
            "UNIQUE_SUFFIX": "${{ vars.UNIQUE_SUFFIX }}",
            "RESOURCE_GROUP": "${{ vars.RESOURCE_GROUP }}",
            "GALLERY_NAME": "${{ vars.GALLERY_NAME }}",
            "PACKER_TEMP_RG": "${{ vars.PACKER_TEMP_RG }}",
            "PACKER_VM_SIZE": "${{ vars.PACKER_VM_SIZE }}",
            "ADMIN_USERNAME": "${{ vars.ADMIN_USERNAME }}"
          }
          ENVEOF
          fi
          jq -r 'to_entries[] | "\(.key)=\(.value)"' env/dev.json >> $GITHUB_ENV

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Latest Gallery Versions
        id: versions
        shell: bash
        run: |
          LINUX_VER=$(az sig image-version list -g $RESOURCE_GROUP --gallery-name $GALLERY_NAME --gallery-image-definition linux-agent --query 'sort_by(@, &publishingProfile.publishedDate)[-1].name' -o tsv)
          WIN_VER=$(az sig image-version list -g $RESOURCE_GROUP --gallery-name $GALLERY_NAME --gallery-image-definition windows-agent --query 'sort_by(@, &publishingProfile.publishedDate)[-1].name' -o tsv)
          if [ -z "$LINUX_VER" ] || [ -z "$WIN_VER" ]; then
            echo "Missing gallery versions: linux='$LINUX_VER' windows='$WIN_VER'" >&2
            exit 1
          fi
          echo "linux=$LINUX_VER" >> $GITHUB_OUTPUT
          echo "windows=$WIN_VER" >> $GITHUB_OUTPUT
          echo "Resolved linux=$LINUX_VER windows=$WIN_VER"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Build Provenance
        shell: bash
        continue-on-error: true
        run: |
          echo "Checking for signed provenance artifacts..."
          # Download the latest provenance from the most recent build-images run
          RUN_ID=$(gh run list --workflow=build-images.yml --branch=main --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::warning::No successful build-images run found. Skipping provenance verification."
            exit 0
          fi
          
          gh run download "$RUN_ID" -n provenance-linux -D provenance-linux 2>/dev/null || true
          gh run download "$RUN_ID" -n provenance-windows -D provenance-windows 2>/dev/null || true
          
          VERIFIED=0
          for img in linux windows; do
            if [ -f "provenance-$img/provenance-$img.json" ] && [ -f "provenance-$img/provenance-$img.sig" ] && [ -f "provenance-$img/provenance-$img.crt" ]; then
              echo "Verifying $img provenance..."
              cosign verify-blob \
                --certificate provenance-$img/provenance-$img.crt \
                --signature provenance-$img/provenance-$img.sig \
                --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
                --certificate-oidc-issuer https://token.actions.githubusercontent.com \
                provenance-$img/provenance-$img.json && ((VERIFIED++))
            else
              echo "::warning::No signed provenance found for $img image"
            fi
          done
          
          echo "Verified $VERIFIED provenance attestations"

      - name: Resolve Admin Password
        id: admin_password
        shell: bash
        run: |
          set -euo pipefail

          KV_NAME=$(az keyvault list -g "$RESOURCE_GROUP" --query '[0].name' -o tsv)
          if [ -z "$KV_NAME" ]; then
            echo "No Key Vault found in $RESOURCE_GROUP" >&2
            exit 1
          fi

          if [ -n "${{ secrets.ADMIN_PASSWORD }}" ]; then
            PW='${{ secrets.ADMIN_PASSWORD }}'
          else
            EXISTING=$(az keyvault secret show --vault-name "$KV_NAME" --name admin-password --query value -o tsv 2>/dev/null || true)
            if [ -n "$EXISTING" ]; then
              PW="$EXISTING"
            else
              PW="$(openssl rand -base64 36 | tr -d '=+/\n' | cut -c1-24)Aa1!"
              az keyvault secret set --vault-name "$KV_NAME" --name admin-password --value "$PW" --output none
            fi
          fi

          echo "::add-mask::$PW"
          echo "value=$PW" >> $GITHUB_OUTPUT
          echo "keyVault=$KV_NAME" >> $GITHUB_OUTPUT

      - name: Create Params File
        shell: bash
        run: |
          ADMIN_SSH_PUBLIC_KEY='${{ secrets.ADMIN_SSH_PUBLIC_KEY }}'
          if [ -z "$ADMIN_SSH_PUBLIC_KEY" ]; then echo 'ADMIN_SSH_PUBLIC_KEY secret required'; exit 1; fi
          cat > deploy-params.json <<EOF
          {
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "org": { "value": "$ORG" },
              "env": { "value": "$ENV" },
              "location": { "value": "$LOCATION" },
              "loc": { "value": "$LOC" },
              "uniqueSuffix": { "value": "$UNIQUE_SUFFIX" },
              "adminUsername": { "value": "$ADMIN_USERNAME" },
              "adminSshPublicKey": { "value": "$ADMIN_SSH_PUBLIC_KEY" },
              "adminPassword": { "value": "${{ steps.admin_password.outputs.value }}" },
              "linuxImageVersion": { "value": "${{ steps.versions.outputs.linux }}" },
              "windowsImageVersion": { "value": "${{ steps.versions.outputs.windows }}" },
              "linuxVmSize": { "value": "${{ github.event.inputs.linuxVmSize }}" },
              "windowsVmSize": { "value": "${{ github.event.inputs.windowsVmSize }}" },
              "enableGhPublicIp": { "value": ${{ github.event.inputs.enableGhPublicIp }} },
              "confirmUseGallery": { "value": true }
            }
          }
          EOF

      - name: Deploy (Gallery)
        run: |
          az deployment group create \
            -g $RESOURCE_GROUP \
            -f infra/deploy/main.bicep \
            -p @deploy-params.json

      - name: Output VM Resources
        run: |
          echo 'VM Scale Set:'
          az vmss list -g $RESOURCE_GROUP --query "[].name" -o tsv || true
          echo 'VMs:'
          az vm list -g $RESOURCE_GROUP --query "[].name" -o tsv || true
