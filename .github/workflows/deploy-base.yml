name: Deploy Base Infrastructure

on:
  workflow_dispatch:
    inputs:
      useGalleryImages:
        description: 'Set true to reference existing gallery versions (ensure images exist).'
        required: false
        default: 'false'
      enableGhPublicIp:
        description: 'Temporary public IP for GitHub runner VM (dev only).'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Base Infra
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        shell: bash
        run: |
          if [ ! -f env/dev.json ]; then
            mkdir -p env
            cat > env/dev.json <<ENVEOF
          {
            "ORG": "${{ vars.ORG }}",
            "ENV": "${{ vars.ENV }}",
            "LOCATION": "${{ vars.LOCATION }}",
            "LOC": "${{ vars.LOC }}",
            "UNIQUE_SUFFIX": "${{ vars.UNIQUE_SUFFIX }}",
            "RESOURCE_GROUP": "${{ vars.RESOURCE_GROUP }}",
            "GALLERY_NAME": "${{ vars.GALLERY_NAME }}",
            "PACKER_TEMP_RG": "${{ vars.PACKER_TEMP_RG }}",
            "PACKER_VM_SIZE": "${{ vars.PACKER_VM_SIZE }}",
            "ADMIN_USERNAME": "${{ vars.ADMIN_USERNAME }}"
          }
          ENVEOF
          fi
          jq -r 'to_entries[] | "\(.key)=\(.value)"' env/dev.json >> $GITHUB_ENV

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group (idempotent)
        run: |
          az group create -n "$RESOURCE_GROUP" -l "$LOCATION" --tags system=build-agents

      - name: Recover soft-deleted Key Vault (if exists)
        run: |
          set -euo pipefail
          KV_NAME="kv${ORG}${ENV}${LOC}${UNIQUE_SUFFIX}"
          echo "Checking for soft-deleted vault: $KV_NAME"
          # show-deleted requires subscription-level access; if it fails, skip gracefully
          if az keyvault show-deleted --name "$KV_NAME" -o none 2>&1; then
            echo "Found soft-deleted vault $KV_NAME — recovering..."
            az keyvault recover --name "$KV_NAME"
            echo "Waiting for recovery to complete..."
            for i in $(seq 1 12); do
              STATE=$(az keyvault show --name "$KV_NAME" --resource-group "$RESOURCE_GROUP" --query properties.provisioningState -o tsv 2>/dev/null || echo "Recovering")
              echo "  Attempt $i/12: state=$STATE"
              if [ "$STATE" = "Succeeded" ]; then break; fi
              sleep 10
            done
            echo "Key Vault $KV_NAME recovered"
          else
            echo "No soft-deleted vault found (or insufficient permissions) — proceeding"
          fi

      - name: Validate Bicep Parameters
        run: |
          echo "ORG=$ORG ENV=$ENV LOC=$LOC UNIQUE_SUFFIX=$UNIQUE_SUFFIX" | sed 's/\r//' 

      - name: Resolve Admin Password
        id: admin_password
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.ADMIN_PASSWORD }}" ]; then
            PW='${{ secrets.ADMIN_PASSWORD }}'
          else
            # Generate a strong bootstrap password when no override secret is provided.
            PW="$(openssl rand -base64 36 | tr -d '=+/\n' | cut -c1-24)Aa1!"
          fi

          echo "::add-mask::$PW"
          echo "value=$PW" >> $GITHUB_OUTPUT

      - name: Deploy Base (what-if)
        run: |
          az deployment group what-if \
            -g "$RESOURCE_GROUP" \
            -f infra/base/main.bicep \
            -p org=$ORG env=$ENV location=$LOCATION loc=$LOC uniqueSuffix=$UNIQUE_SUFFIX \
               adminUsername=$ADMIN_USERNAME adminSshPublicKey='${{ secrets.ADMIN_SSH_PUBLIC_KEY }}' \
               adminPassword='${{ steps.admin_password.outputs.value }}' \
               useGalleryImages=${{ github.event.inputs.useGalleryImages || 'false' }} \
               enableGhPublicIp=${{ github.event.inputs.enableGhPublicIp || 'false' }} \
               githubOidcClientId='${{ secrets.AZURE_CLIENT_ID }}'
        continue-on-error: true

      - name: Deploy Base (create / update)
        run: |
          az deployment group create \
            -g "$RESOURCE_GROUP" \
            -f infra/base/main.bicep \
            -p org=$ORG env=$ENV location=$LOCATION loc=$LOC uniqueSuffix=$UNIQUE_SUFFIX \
               adminUsername=$ADMIN_USERNAME adminSshPublicKey='${{ secrets.ADMIN_SSH_PUBLIC_KEY }}' \
               adminPassword='${{ steps.admin_password.outputs.value }}' \
               useGalleryImages=${{ github.event.inputs.useGalleryImages || 'false' }} \
               enableGhPublicIp=${{ github.event.inputs.enableGhPublicIp || 'false' }} \
               githubOidcClientId='${{ secrets.AZURE_CLIENT_ID }}'

      - name: Output Resources
        run: |
          az deployment group show -g "$RESOURCE_GROUP" -n main --query 'properties.outputs' -o json || true
          echo "Key Vault:" $(az keyvault list -g "$RESOURCE_GROUP" --query '[0].name' -o tsv)

      - name: Mask Sensitive Values
        if: always()
        run: |
          echo "::add-mask::${{ steps.admin_password.outputs.value }}"

      - name: Post Summary
        run: |
          echo "### Base Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Resource Group: $RESOURCE_GROUP" >> $GITHUB_STEP_SUMMARY
          echo "Location: $LOCATION" >> $GITHUB_STEP_SUMMARY
          echo "Use Gallery Images: ${{ github.event.inputs.useGalleryImages || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "Public IP for GH Runner: ${{ github.event.inputs.enableGhPublicIp || 'false' }}" >> $GITHUB_STEP_SUMMARY
