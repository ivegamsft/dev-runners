name: Build and Publish Agent Images

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/image/**'
      - 'infra/images/**'
      - '.github/workflows/build-images.yml'

permissions:
  id-token: write   # (optional if using SP secret auth only)
  contents: read

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Ensure Image Definitions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        shell: bash
        run: |
          if [ ! -f env/dev.json ]; then
            mkdir -p env
            cat > env/dev.json <<ENVEOF
          {
            "ORG": "${{ vars.ORG }}",
            "ENV": "${{ vars.ENV }}",
            "LOCATION": "${{ vars.LOCATION }}",
            "LOC": "${{ vars.LOC }}",
            "UNIQUE_SUFFIX": "${{ vars.UNIQUE_SUFFIX }}",
            "RESOURCE_GROUP": "${{ vars.RESOURCE_GROUP }}",
            "GALLERY_NAME": "${{ vars.GALLERY_NAME }}",
            "PACKER_TEMP_RG": "${{ vars.PACKER_TEMP_RG }}",
            "PACKER_VM_SIZE": "${{ vars.PACKER_VM_SIZE }}",
            "ADMIN_USERNAME": "${{ vars.ADMIN_USERNAME }}"
          }
          ENVEOF
          fi
          jq -r 'to_entries[] | "\(.key)=\(.value)"' env/dev.json >> "$GITHUB_ENV"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group (idempotent)
        run: |
          az group create -n $RESOURCE_GROUP -l $LOCATION --tags system=build-agents

      - name: Deploy Image Definitions (idempotent)
        run: |
          az deployment group create \
            -g $RESOURCE_GROUP \
            -f infra/images/main.bicep \
            -p org=$ORG env=$ENV loc=$LOC uniqueSuffix=$UNIQUE_SUFFIX galleryName=$GALLERY_NAME

  build:
    name: Packer Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: linux
            template: scripts/image/linux-packer.json
            definition: linux-agent
          - image: windows
            template: scripts/image/windows-packer.json
            definition: windows-agent
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        shell: bash
        run: |
          if [ ! -f env/dev.json ]; then
            mkdir -p env
            cat > env/dev.json <<ENVEOF
          {
            "ORG": "${{ vars.ORG }}",
            "ENV": "${{ vars.ENV }}",
            "LOCATION": "${{ vars.LOCATION }}",
            "LOC": "${{ vars.LOC }}",
            "UNIQUE_SUFFIX": "${{ vars.UNIQUE_SUFFIX }}",
            "RESOURCE_GROUP": "${{ vars.RESOURCE_GROUP }}",
            "GALLERY_NAME": "${{ vars.GALLERY_NAME }}",
            "PACKER_TEMP_RG": "${{ vars.PACKER_TEMP_RG }}",
            "PACKER_VM_SIZE": "${{ vars.PACKER_VM_SIZE }}",
            "ADMIN_USERNAME": "${{ vars.ADMIN_USERNAME }}"
          }
          ENVEOF
          fi
          jq -r 'to_entries[] | "\(.key)=\(.value)"' env/dev.json >> "$GITHUB_ENV"
          echo "PACKER_LOCATION=$(jq -r .LOCATION env/dev.json)" >> "$GITHUB_ENV"
          echo "PACKER_IMAGE_RG=$(jq -r .RESOURCE_GROUP env/dev.json)" >> "$GITHUB_ENV"
          echo "GALLERY_RG=$(jq -r .RESOURCE_GROUP env/dev.json)" >> "$GITHUB_ENV"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: 1.12.0

      - name: Install Azure Packer Plugin
        run: |
          packer plugins install github.com/hashicorp/azure@v2.3.3

      - name: Compute Unique Gallery Version
        id: version
        shell: bash
        run: |
          YEAR=$(date +'%Y')
          MONTH=$(date +'%m' | sed 's/^0*//')
          DAY=$(date +'%d' | sed 's/^0*//')
          PATCH=$DAY
          BASE="$YEAR.$MONTH.$PATCH"
          # bump patch if version already exists for this definition
          while az sig image-version show -g "$RESOURCE_GROUP" --gallery-name "$GALLERY_NAME" --gallery-image-definition "${{ matrix.definition }}" --gallery-image-version "$YEAR.$MONTH.$PATCH" >/dev/null 2>&1; do
            PATCH=$((PATCH+1))
          done
          VERSION="$YEAR.$MONTH.$PATCH"
          echo "GALLERY_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version $VERSION"

      - name: Packer Validate
        run: packer validate ${{ matrix.template }}

      - name: Build Image (${{ matrix.image }})
        run: |
          packer build -only=azure-arm ${{ matrix.template }}

      - name: Show Created Version
        run: |
          az sig image-version show -g $RESOURCE_GROUP --gallery-name $GALLERY_NAME --gallery-image-definition ${{ matrix.definition }} --gallery-image-version $GALLERY_VERSION --query "{name:name,publishDate:publishingProfile.publishedDate}" -o json || true

      - name: Upload CIS Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cis-report-${{ matrix.image }}
          path: cis-report-*.json
          if-no-files-found: ignore

      - name: Upload Build Metadata
        uses: actions/upload-artifact@v4
        with:
          name: packer-${{ matrix.image }}-metadata
          path: |
            packer-manifest.json
            ${{ matrix.template }}
          if-no-files-found: ignore
        continue-on-error: true

      - name: Generate Build Provenance
        id: provenance
        shell: bash
        run: |
          cat > provenance-${{ matrix.image }}.json <<EOF
          {
            "builder": {
              "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            },
            "buildType": "packer-azure-image",
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                "digest": { "sha1": "${{ github.sha }}" },
                "entryPoint": "${{ matrix.template }}"
              }
            },
            "metadata": {
              "buildStartedOn": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "completeness": { "parameters": true, "environment": true, "materials": false }
            },
            "materials": [
              {
                "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                "digest": { "sha1": "${{ github.sha }}" }
              }
            ]
          }
          EOF

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign Provenance (keyless OIDC)
        shell: bash
        run: |
          cosign sign-blob --yes \
            --oidc-issuer https://token.actions.githubusercontent.com \
            --output-signature provenance-${{ matrix.image }}.sig \
            --output-certificate provenance-${{ matrix.image }}.crt \
            provenance-${{ matrix.image }}.json

      - name: Upload Signed Provenance
        uses: actions/upload-artifact@v4
        with:
          name: provenance-${{ matrix.image }}
          path: |
            provenance-${{ matrix.image }}.json
            provenance-${{ matrix.image }}.sig
            provenance-${{ matrix.image }}.crt

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        shell: bash
        run: |
          if [ ! -f env/dev.json ]; then
            mkdir -p env
            cat > env/dev.json <<ENVEOF
          {
            "ORG": "${{ vars.ORG }}",
            "ENV": "${{ vars.ENV }}",
            "LOCATION": "${{ vars.LOCATION }}",
            "LOC": "${{ vars.LOC }}",
            "UNIQUE_SUFFIX": "${{ vars.UNIQUE_SUFFIX }}",
            "RESOURCE_GROUP": "${{ vars.RESOURCE_GROUP }}",
            "GALLERY_NAME": "${{ vars.GALLERY_NAME }}",
            "PACKER_TEMP_RG": "${{ vars.PACKER_TEMP_RG }}",
            "PACKER_VM_SIZE": "${{ vars.PACKER_VM_SIZE }}",
            "ADMIN_USERNAME": "${{ vars.ADMIN_USERNAME }}"
          }
          ENVEOF
          fi
          jq -r 'to_entries[] | "\(.key)=\(.value)"' env/dev.json >> "$GITHUB_ENV"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Versions Published
        run: |
          echo "Published versions:" > versions.txt
          echo "(Assuming az context from previous steps; if empty, add a login step)" >> versions.txt
          echo "Linux:" >> versions.txt
          az sig image-version list -g $RESOURCE_GROUP --gallery-name $GALLERY_NAME --gallery-image-definition linux-agent --query '[].name' -o tsv >> versions.txt || true
          echo "Windows:" >> versions.txt
          az sig image-version list -g $RESOURCE_GROUP --gallery-name $GALLERY_NAME --gallery-image-definition windows-agent --query '[].name' -o tsv >> versions.txt || true
          cat versions.txt
      - uses: actions/upload-artifact@v4
        with:
          name: gallery-versions
          path: versions.txt
